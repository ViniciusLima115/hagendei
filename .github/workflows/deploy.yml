name: Deploy VPS

on:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Configure pinned host key
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          BRANCH: ${{ github.ref_name }}
          COMPOSE_PROJECT: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
          COMPOSE_FILE: docker-compose.yml
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_PATH' && git fetch --prune origin '$BRANCH' && git checkout '$BRANCH' && git merge --ff-only 'origin/$BRANCH' && docker compose -p '$COMPOSE_PROJECT' -f '$COMPOSE_FILE' up -d --build --remove-orphans"
