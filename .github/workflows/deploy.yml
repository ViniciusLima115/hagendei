name: Deploy VPS

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
          
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H api-staging.virtualbarber.shop >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H api.virtualbarber.shop >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy Staging
        if: github.ref == 'refs/heads/develop'
        run: |
          ssh -o StrictHostKeyChecking=no mankindbr@api-staging.virtualbarber.shop "
            cd ~/barbershop-chatbot &&
            git fetch origin &&
            git checkout develop &&
            git reset --hard origin/develop &&
            docker-compose -p staging -f docker-compose.staging.yml up -d --build
                "

      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          ssh -o StrictHostKeyChecking=no mankindbr@api.virtualbarber.shop "
            cd ~/barbershop-chatbot &&
            git fetch origin &&
            git checkout main &&
            git reset --hard origin/main &&
            docker-compose -p prod -f docker-compose.prod.yml up -d --build
          "